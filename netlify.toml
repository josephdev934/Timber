[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NPM_FLAGS = "--include=dev"
  NEXT_TELEMETRY_DISABLED = "1"
  SECRETS_SCAN_OMIT_KEYS = "NODE_ENV,MONGODB_URI,JWT_SECRET,REDIS_URL,CLOUDINARY_API_KEY,CLOUDINARY_API_SECRET,NEXT_PUBLIC_APP_URL"
  SECRETS_SCAN_OMIT_PATHS = ".next/**"

[[plugins]]
  package = "@netlify/plugin-nextjs"
